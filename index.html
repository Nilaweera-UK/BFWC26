    function App() {

      const [users, setUsers] = useState([]);

      const [session, setSession] = useState(null);
      const [adminMode, setAdminMode] = useState(false);
      const [loading, setLoading] = useState(true);

      const fetchData = useCallback(async () => {
        try {
          const [{ data: uData }, { data: rData }] = await Promise.all([
            sb.from("blossom_users").select("*"),
            sb.from("blossom_results").select("*"),
          ]);
          if (uData) setUsers(uData);
          if (rData) {
            const rMap = {};
            rData.forEach(r => rMap[r.fixture_id] = r.result);
            setResults(rMap);
          }
        } catch (e) { console.error(e); }
        setLoading(false);
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);

      useEffect(() => {
        const uSub = sb.channel("blossom-users-changes")
          .on("postgres_changes", { event: "*", schema: "public", table: "blossom_users" }, fetchData)
          .subscribe();
        const rSub = sb.channel("blossom-results-changes")
          .on("postgres_changes", { event: "*", schema: "public", table: "blossom_results" }, fetchData)
          .subscribe();
        return () => { sb.removeChannel(uSub); sb.removeChannel(rSub); };
      }, [fetchData]);

      const saveUser = async (userData) => {
        await sb.from("blossom_users").upsert(userData, { onConflict: "email" });
        await fetchData();
      };

      const saveResult = async (fixtureId, result) => {
        await sb.from("blossom_results").upsert({ fixture_id: fixtureId, result, updated_at: new Date().toISOString() }, { onConflict: "fixture_id" });
        await fetchData();
      };

      const deleteUser = async (email) => {
        await sb.from("blossom_users").delete().eq("email", email);
        await fetchData();
      };

      const closed = new Date() >= DEADLINE;

      const scoreUser = (preds) => {
        let pts = 0, correct = 0;
        for (const [fid, pred] of Object.entries(preds || {}))
          if (results[fid] && results[fid] === pred) { pts += 3; correct++; }
        return { pts, correct };
      };

      const leaderboard = users
        .map(u => ({ ...u, predictions: u.predictions || {}, ...scoreUser(u.predictions) }))
        .sort((a, b) => b.pts - a.pts || b.correct - a.correct);

      const sessionUser = session ? users.find(u => u.email === session) : null;

      const Header = () => (

            <div className="app-sub">Predict all 72 group stage fixtures — best score wins!</div>
            <div className="schools-row">
              {SCHOOLS.map(s => <span key={s} className="school-chip">{s}</span>)}
            </div>
            <div className="nav">
              {[["home","🏠 Home"],["predict","📝 Predict"],["fixtures","📅 Fixtures"],["leaderboard","🏆 Leaderboard"],["admin","🔧 Admin"]].map(([v,label]) => (
                <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={() => setView(v)}>{label}</button>
              ))}
            </div>
          </div>
          <div className="header-accent"/>
        </div>
      );

      if (loading) return (
        <>
          <style>{css}</style>
          <div className="app"><Header/><div className="spinner"><div className="spin"/></div></div>
        </>
      );

      return (
        <>
          <style>{css}</style>
          <div className="app">
            <Header/>
            <div className="content">
              {view==="home"      && <HomeView closed={closed} setView={setView} leaderboard={leaderboard} results={results}/>}
              {view==="predict"   && <PredictView users={users} saveUser={saveUser} session={session} setSession={setSession} closed={closed} sessionUser={sessionUser}/>}
              {view==="fixtures"  && <FixturesView results={results} leaderboard={leaderboard}/>}
              {view==="leaderboard" && <LeaderboardView leaderboard={leaderboard} results={results}/>}
              {view==="admin"     && <AdminView results={results} saveResult={saveResult} adminMode={adminMode} setAdminMode={setAdminMode} users={users} saveUser={saveUser} deleteUser={deleteUser}/>}
            </div>
          </div>
        </>
      );
    }

    // ─── HOME ─────────────────────────────────────────────────────────────────
    function HomeView({ closed, setView, leaderboard, results }) {
      return (
        <div>
          <div className="card card-accent">
            <div style={{fontSize:19,fontWeight:800,marginBottom:8,color:"#2e7d32"}}>Welcome, Blossom Federation! 🌍</div>
            <p style={{fontSize:14,color:"#555",lineHeight:1.65,marginBottom:12}}>
              Open to all staff and pupils across <strong>Daubeney</strong>, <strong>Lauriston</strong> and <strong>Sebright</strong>. Predict the result of all 72 FIFA World Cup 2026 group stage matches. Earn <strong>3 points</strong> for every correct result. Highest score wins!
            </p>
            {closed
              ? <div className="alert alert-warn">⏰ Submissions are now <strong>closed</strong> — the tournament has begun!</div>
              : <div className="alert alert-green">✅ Submissions open until <strong>11 June 2026, 7:00 PM GMT</strong></div>
            }
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:4}}>
              {!closed && <button className="btn" onClick={() => setView("predict")}>📝 Submit My Predictions</button>}
              <button className="btn btn-yellow" onClick={() => setView("leaderboard")}>🏆 View Leaderboard</button>
              <button className="btn" style={{background:"#00796b"}} onClick={() => setView("fixtures")}>📅 View Fixtures</button>
            </div>
          </div>

          <div className="stat-grid">
            {[["⚽","72","Group Fixtures"],["👥",leaderboard.length,"Participants"],["📊",`${Object.keys(results).length}/72`,"Results In"],["🏅","3 pts","Per Correct Pick"]].map(([icon,val,label]) => (
              <div key={label} className="stat-card">
                <div style={{fontSize:22,marginBottom:4}}>{icon}</div>
                <div className="stat-val">{val}</div>
                <div className="stat-label">{label}</div>
              </div>
            ))}
          </div>

          {/* Per-school breakdown */}
          {leaderboard.length > 0 && (
            <div className="card">
              <div className="section-title">🌸 School Breakdown</div>
              {SCHOOLS.map(school => {
                const members = leaderboard.filter(u => u.school === school);
                const top = members[0];
                return (
                  <div key={school} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"8px 0",borderBottom:"1px solid #f1f8e9"}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:700,color:"#2e7d32"}}>{school}</div>
                      <div style={{fontSize:12,color:"#888",marginTop:2}}>{members.length} participant{members.length!==1?"s":""}{top?` · Leader: ${top.name} (${top.pts} pts)`:""}</div>
                    </div>
                    <div className="pill">{members.length}</div>
                  </div>
                );
              })}
            </div>
          )}

          {leaderboard.length > 0 && leaderboard[0].pts > 0 && (
            <div className="card">
              <div className="section-title">🏆 Top 3 Overall</div>
              {leaderboard.slice(0,3).map((u,i) => (
                <div key={u.email} className={`lb-row${i===0?" gold":""}`}>
                  <span style={{fontSize:20}}>{["🥇","🥈","🥉"][i]}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:700}}>{u.name}</div>
                    <div style={{fontSize:11,color:"#aaa"}}>{u.school}</div>
                  </div>
                  <span className="badge">{u.pts} pts</span>
                </div>
              ))}
            </div>
          )}

          {leaderboard.length > 0 && (() => {
            const allTeamsList = ["Algeria","Argentina","Australia","Austria","Belgium","Bosnia and Herzegovina","Brazil","Canada","Cape Verde","Czechia","Colombia","Croatia","Curacao","DR Congo","Ecuador","Egypt","England","France","Germany","Ghana","Haiti","Iran","Iraq","Ivory Coast","Japan","Jordan","Mexico","Morocco","Netherlands","New Zealand","Norway","Panama","Paraguay","Portugal","Qatar","Saudi Arabia","Scotland","Senegal","South Africa","South Korea","Spain","Sweden","Switzerland","Tunisia","Turkey","Uruguay","USA","Uzbekistan"];
            const teamPts = {};
            allTeamsList.forEach(t => teamPts[t] = 0);
            leaderboard.forEach(u => {
              if (u.favourite_team_1) teamPts[u.favourite_team_1] = (teamPts[u.favourite_team_1]||0) + 3;
              if (u.favourite_team_2) teamPts[u.favourite_team_2] = (teamPts[u.favourite_team_2]||0) + 2;
              if (u.favourite_team_3) teamPts[u.favourite_team_3] = (teamPts[u.favourite_team_3]||0) + 1;
            });
            const ranked = Object.entries(teamPts).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0]));
            const max = ranked[0][1] || 1;

              <div className="card">
                <div className="section-title">❤️ Federation's Favourite Teams</div>

                {ranked.map(([team, pts], i) => (

                      {pts>0?(i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1):i+1}

    // ─── PREDICT ──────────────────────────────────────────────────────────────
    function PredictView({ users, saveUser, session, setSession, closed, sessionUser }) {
      // Steps: "register" → "password" → "class" → "teams" → "form"
      const [step, setStep] = useState(sessionUser ? "form" : "register");
      const [email, setEmail] = useState("");
      const [school, setSchool] = useState("");
      const [schoolPw, setSchoolPw] = useState("");
      const [submissionType, setSubmissionType] = useState(""); // "self" | "class"
      const [staffName, setStaffName] = useState("");
      const [className, setClassName] = useState("");
      const [displayName, setDisplayName] = useState("");
      const [favTeam1, setFavTeam1] = useState(sessionUser?.favourite_team_1 || "");
      const [favTeam2, setFavTeam2] = useState(sessionUser?.favourite_team_2 || "");
      const [favTeam3, setFavTeam3] = useState(sessionUser?.favourite_team_3 || "");
      const [preds, setPreds] = useState(sessionUser?.predictions || {});
      const [activeGroup, setActiveGroup] = useState("A");
      const [err, setErr] = useState("");
      const [saving, setSaving] = useState(false);

      useEffect(() => {
        if (sessionUser) { setPreds(sessionUser.predictions || {}); setStep("form"); }
      }, [sessionUser]);

      // ── Step 1: email + school ──────────────────────────────────────────────
      const handleRegister = () => {
        setErr("");
        const e = email.trim().toLowerCase();
        if (!e.endsWith(EMAIL_DOMAIN)) {
          setErr(`Please use your Blossom school email (${EMAIL_DOMAIN})`);
          return;
        }
        if (!school) { setErr("Please select your school."); return; }
        const existing = users.find(u => u.email === e);
        if (existing?.submitted) { setErr("This email has already submitted predictions."); return; }
        // derive staff name from email
        const local = e.split("@")[0];
        const derived = local.replace(/[._-]/g," ").replace(/\b\w/g,c=>c.toUpperCase()).trim();
        setStaffName(derived);
        setStep("password");
      };

      // ── Step 2: school password ─────────────────────────────────────────────
      const handlePassword = () => {
        setErr("");
        if (schoolPw.trim() !== SCHOOL_PASSWORDS[school]) {
          setErr("Incorrect password for this school. Please check with your coordinator.");
          return;
        }
        setStep("class");
      };

      // ── Step 3: self or class ───────────────────────────────────────────────
      const handleClassStep = () => {
        setErr("");
        if (!submissionType) { setErr("Please choose an option."); return; }
        if (submissionType === "class" && !className.trim()) {
          setErr("Please enter the class name.");
          return;
        }
        const name = submissionType === "class" ? className.trim() : staffName;
        setDisplayName(name);
        setSession(email.trim().toLowerCase());
        setStep("teams");
      };

      // ── Step 4: favourite teams → then predictions form ─────────────────────
      const handleTeamsStep = () => {
        setStep("form");
      };

      const setPred = (fid, val) => setPreds(p => ({...p,[fid]:val}));
      const total = Object.keys(preds).length;
      const allDone = total === FIXTURES.length;

      const handleSubmit = async () => {
        if (!allDone) { setErr(`Please predict all 72 fixtures. You've done ${total}/72.`); return; }
        setSaving(true);
        const e = email.trim().toLowerCase() || session;
        const name = displayName || sessionUser?.name;
        await saveUser({
          email: e,
          name,
          user_type: "Staff",
          submission_type: submissionType || sessionUser?.submission_type,
          school: school || sessionUser?.school,
          favourite_team_1: favTeam1 || sessionUser?.favourite_team_1,
          favourite_team_2: favTeam2 || sessionUser?.favourite_team_2,
          favourite_team_3: favTeam3 || sessionUser?.favourite_team_3,
          predictions: preds,
          submitted: true,
        });
        setSaving(false);
      };

      if (closed) return <div className="card card-accent"><div style={{fontSize:18,fontWeight:800,color:"#2e7d32",marginBottom:8}}>⏰ Submissions Closed</div><p style={{fontSize:14,color:"#555"}}>The deadline has passed. Check the leaderboard!</p></div>;

      if (sessionUser?.submitted) return (
        <div className="card" style={{textAlign:"center",padding:"2rem 1.5rem"}}>
          <div style={{fontSize:40,marginBottom:12}}>✅</div>
          <div style={{fontSize:20,fontWeight:800,color:"#2e7d32",marginBottom:8}}>Predictions Locked In!</div>
          <p style={{fontSize:14,color:"#555",marginBottom:16}}>Thanks <strong>{sessionUser.name}</strong>! Your 72 predictions are saved and live on the leaderboard.</p>
          <div className="alert alert-green-soft">Good luck! 🍀 Check the Fixtures page as results come in.</div>
        </div>
      );

      const allTeams = ["Algeria","Argentina","Australia","Austria","Belgium","Bosnia and Herzegovina","Brazil","Canada","Cape Verde","Czechia","Colombia","Croatia","Curacao","DR Congo","Ecuador","Egypt","England","France","Germany","Ghana","Haiti","Iran","Iraq","Ivory Coast","Japan","Jordan","Mexico","Morocco","Netherlands","New Zealand","Norway","Panama","Paraguay","Portugal","Qatar","Saudi Arabia","Scotland","Senegal","South Africa","South Korea","Spain","Sweden","Switzerland","Tunisia","Turkey","Uruguay","USA","Uzbekistan"];

      // ── STEP 1: Email + school ──────────────────────────────────────────────
      if (step==="register") return (
        <div className="card card-accent">
          <div className="section-title">📧 Staff Sign-In</div>
          <div className="alert alert-green-soft" style={{marginBottom:14}}>
            This predictor is for <strong>staff only</strong>. You can submit predictions for yourself or on behalf of your class.
          </div>
          <div style={{fontSize:13,fontWeight:700,color:"#2e7d32",marginBottom:6}}>Your school email</div>
          <input className="input" placeholder={`yourname${EMAIL_DOMAIN}`} value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleRegister()}/>
          <div style={{fontSize:13,fontWeight:700,color:"#2e7d32",marginBottom:8}}>Your school</div>
          <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
            {SCHOOLS.map(s=>(
              <button key={s} className={`pred-btn${school===s?" selected":""}`} style={{padding:"9px 14px",fontSize:13,textAlign:"left"}} onClick={()=>setSchool(s)}>🏫 {s}</button>
            ))}
          </div>
          {err && <div className="err">{err}</div>}
          <button className="btn" onClick={handleRegister}>Next →</button>
        </div>
      );

      // ── STEP 2: School password ─────────────────────────────────────────────
      if (step==="password") return (
        <div className="card card-accent">
          <div className="section-title">🔑 School Password</div>
          <p style={{fontSize:13,color:"#666",marginBottom:14,lineHeight:1.6}}>
            Enter the staff password for <strong>{school}</strong>. If you don't have it, please ask your competition coordinator.
          </p>
          <input className="input" type="password" placeholder="School password" value={schoolPw} onChange={e=>setSchoolPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handlePassword()}/>
          {err && <div className="err">{err}</div>}
          <div style={{display:"flex",gap:8}}>
            <button className="btn" style={{background:"#888"}} onClick={()=>setStep("register")}>← Back</button>
            <button className="btn" onClick={handlePassword}>Verify →</button>
          </div>
        </div>
      );

      // ── STEP 3: Self or class ───────────────────────────────────────────────
      if (step==="class") return (
        <div className="card card-accent">
          <div className="section-title">👤 Who is this entry for?</div>
          <p style={{fontSize:13,color:"#666",marginBottom:14,lineHeight:1.6}}>
            You can submit predictions for yourself, or fill them in on behalf of a class. The name shown on the leaderboard will be yours or your class name accordingly.
          </p>
          <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
            <button
              className={`pred-btn${submissionType==="self"?" selected":""}`}
              style={{padding:"12px 16px",fontSize:13,textAlign:"left",borderRadius:10}}
              onClick={()=>setSubmissionType("self")}
            >
              <div style={{fontWeight:800}}>🙋 Myself</div>
              <div style={{fontSize:12,color:submissionType==="self"?"rgba(255,255,255,0.8)":"#888",marginTop:2}}>Appears as: <em>{staffName}</em></div>
            </button>
            <button
              className={`pred-btn${submissionType==="class"?" selected":""}`}
              style={{padding:"12px 16px",fontSize:13,textAlign:"left",borderRadius:10}}
              onClick={()=>setSubmissionType("class")}
            >
              <div style={{fontWeight:800}}>🏫 On behalf of my class</div>
              <div style={{fontSize:12,color:submissionType==="class"?"rgba(255,255,255,0.8)":"#888",marginTop:2}}>You'll enter the class name below</div>
            </button>
          </div>
          {submissionType==="class" && (
            <div style={{marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,color:"#2e7d32",marginBottom:6}}>Class name</div>
              <input
                className="input"
                placeholder={`e.g. Year 4 ${school.split(" ")[0]}`}
                value={className}
                onChange={e=>setClassName(e.target.value)}
                style={{marginBottom:0}}
              />
              <div style={{fontSize:12,color:"#546e7a",marginTop:4}}>This is how the entry will appear on the leaderboard.</div>
            </div>
          )}
          {err && <div className="err">{err}</div>}
          <div style={{display:"flex",gap:8}}>
            <button className="btn" style={{background:"#888"}} onClick={()=>setStep("password")}>← Back</button>
            <button className="btn" onClick={handleClassStep}>Next →</button>
          </div>
        </div>
      );

      // ── STEP 4: Favourite teams ─────────────────────────────────────────────
      if (step==="teams") return (
        <div className="card card-accent">
          <div className="section-title">❤️ Favourite Teams</div>
          <p style={{fontSize:13,color:"#666",marginBottom:6,lineHeight:1.6}}>Pick your top 3 teams — used to rank the federation's favourites.</p>
          <div style={{fontSize:12,color:"#546e7a",marginBottom:14}}>🥇 3 pts · 🥈 2 pts · 🥉 1 pt (optional — you can skip this)</div>
          {[["🥇 1st choice",favTeam1,setFavTeam1],["🥈 2nd choice",favTeam2,setFavTeam2],["🥉 3rd choice",favTeam3,setFavTeam3]].map(([label,val,setter],idx)=>{
            const taken = [favTeam1,favTeam2,favTeam3].filter((_,i)=>i!==idx).filter(Boolean);
            return (
              <div key={label} style={{marginBottom:10}}>
                <div style={{fontSize:12,fontWeight:700,color:"#2e7d32",marginBottom:4}}>{label}</div>
                <select className="input" style={{marginBottom:0}} value={val} onChange={e=>setter(e.target.value)}>
                  <option value="">Select a team...</option>
                  {allTeams.filter(t=>!taken.includes(t)).map(t=><option key={t} value={t}>{FLAGS[t]||"🏳"} {t}</option>)}
                </select>
              </div>
            );
          })}
          <div style={{marginTop:16,display:"flex",gap:8}}>
            <button className="btn" style={{background:"#888"}} onClick={()=>setStep("class")}>← Back</button>
            <button className="btn" onClick={handleTeamsStep}>Start Predicting →</button>
          </div>
        </div>
      );

      return (
        <div>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontWeight:800,fontSize:15,color:"#2e7d32"}}>{sessionUser?.name||displayName}'s Predictions</div>
                <div style={{fontSize:13,color:"#546e7a"}}>{total} of 72 fixtures predicted</div>
              </div>
              <div className="pill" style={allDone?{background:"#e8f5e9",color:"#1b5e20"}:{}}>{allDone?"✅ All done!":`${72-total} remaining`}</div>
            </div>
            <div className="progress-bar"><div className="progress-fill" style={{width:`${(total/72)*100}%`}}/></div>
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
            {Object.keys(GROUPS).map(g=>{
              const gf=FIXTURES.filter(f=>f.group===g),done=gf.filter(f=>preds[f.id]).length;
              return <button key={g} className={`group-tab${activeGroup===g?" active":""}`} onClick={()=>setActiveGroup(g)}>Group {g} {done===gf.length?"✅":`${done}/${gf.length}`}</button>;
            })}
          </div>
          <div className="card">
            <div className="section-title">Group {activeGroup}</div>
            {FIXTURES.filter(f=>f.group===activeGroup).map(f=>(
              <div key={f.id} className="fix-row">
                <div className="fix-label">{FLAGS[f.home]||"🏳"} {f.home} <span style={{color:"#ccc",margin:"0 6px",fontWeight:400}}>vs</span> {FLAGS[f.away]||"🏳"} {f.away}</div>
                <div className="pred-btns">
                  {[["H",`${f.home} win`],["D","Draw"],["A",`${f.away} win`]].map(([c,label])=>(
                    <button key={c} className={`pred-btn${preds[f.id]===c?" selected":""}`} onClick={()=>setPred(f.id,c)}>{label}</button>
                  ))}
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:14}}>
            {err && <div className="err">{err}</div>}
            <button className={`btn${allDone?"":" btn-gray"}`} style={allDone?{background:"#2e7d32"}:{}} onClick={handleSubmit} disabled={!allDone||saving}>
              {saving?"💾 Saving...":allDone?"🔒 Lock In My Predictions":`Complete all fixtures first (${total}/72)`}
            </button>
            <div style={{fontSize:12,color:"#aaa",marginTop:8}}>⚠️ Once submitted, predictions cannot be changed.</div>
          </div>
        </div>
      );
    }

    // ─── FIXTURES ─────────────────────────────────────────────────────────────
    function FixturesView({ results, leaderboard }) {
      const [filter, setFilter] = useState("All");
      const byDate = {};
      FIXTURES.forEach(f => { if (!byDate[f.date]) byDate[f.date]=[]; byDate[f.date].push(f); });
      const getPredStats = fid => {
        let h=0,d=0,a=0;
        leaderboard.forEach(u=>{const p=(u.predictions||{})[fid];if(p==="H")h++;else if(p==="D")d++;else if(p==="A")a++;});
        return {h,d,a,total:h+d+a};
      };
      const formatDate = s => new Date(s+"T12:00:00Z").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
      const dates = Object.keys(byDate).sort();
      const filteredDates = filter==="All"?dates:dates.filter(d=>byDate[d].some(f=>f.group===filter));
      return (
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div className="section-title" style={{marginBottom:8}}>📅 Group Stage Fixtures</div>
            <p style={{fontSize:13,color:"#666",marginBottom:12}}>All times in GMT. Prediction stats update as results are entered.</p>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <button className={`group-tab${filter==="All"?" active":""}`} onClick={()=>setFilter("All")}>All Groups</button>
              {Object.keys(GROUPS).map(g=>(
                <button key={g} className={`group-tab${filter===g?" active":""}`} onClick={()=>setFilter(g)}>Group {g}</button>
              ))}
            </div>
          </div>
          {filteredDates.map(date=>{
            const dayF=byDate[date].filter(f=>filter==="All"||f.group===filter);
            if(!dayF.length) return null;
            return (
              <div key={date}>
                <div className="date-header">📆 {formatDate(date)}</div>
                {dayF.map(f=>{
                  const res=results[f.id],stats=getPredStats(f.id);
                  return (
                    <div key={f.id} className="fix-card">
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{fontSize:14,fontWeight:700,flex:1}}>{FLAGS[f.home]||"🏳"} {f.home}</div>
                        <div style={{fontSize:11,color:"#bbb",fontWeight:700}}>vs</div>
                        <div style={{fontSize:14,fontWeight:700,flex:1,textAlign:"right"}}>{f.away} {FLAGS[f.away]||"🏳"}</div>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <span style={{fontSize:10,fontWeight:800,background:"#e8f5e9",color:"#2e7d32",borderRadius:10,padding:"2px 8px"}}>Group {f.group}</span>
                          <span style={{fontSize:11,color:"#aaa",fontWeight:600}}>🕐 {f.time.replace("+1","")} GMT</span>
                        </div>
                        {res?<span className="badge badge-green">{res==="H"?`${f.home} win`:res==="D"?"Draw":`${f.away} win`}</span>:<span className="badge badge-gray">No result yet</span>}
                      </div>
                      {stats.total>0&&(
                        <div style={{marginTop:10,borderTop:"1px solid #f1f8e9",paddingTop:8}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#546e7a",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.4px"}}>
                            Predictions — {stats.total} participant{stats.total!==1?"s":""}
                            {res&&<span style={{marginLeft:8,color:"#2e7d32"}}>· {res==="H"?stats.h:res==="D"?stats.d:stats.a} correct ({Math.round(((res==="H"?stats.h:res==="D"?stats.d:stats.a)/stats.total)*100)}%)</span>}
                          </div>
                          {[["H",f.home,stats.h,"#2e7d32"],["D","Draw",stats.d,"#f9a825"],["A",f.away,stats.a,"#00796b"]].map(([code,label,count,color])=>{
                            const pct=stats.total>0?Math.round((count/stats.total)*100):0,correct=res&&res===code;
                            return (
                              <div key={code} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3,fontSize:11,color:"#666"}}>
                                <span style={{minWidth:100,fontWeight:correct?700:400,color:correct?"#2e7d32":"#666"}}>{label}{correct?" ✅":""}</span>
                                <div className="bar-bg"><div className="bar-fill" style={{width:`${pct}%`,background:correct?"#2e7d32":color,opacity:correct?1:0.5}}/></div>
                                <span style={{minWidth:36,textAlign:"right",fontWeight:600,color:correct?"#2e7d32":"#888"}}>{pct}%</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      );
    }

    // ─── LEADERBOARD ──────────────────────────────────────────────────────────
    function LeaderboardView({ leaderboard, results }) {
      const [filterSchool, setFilterSchool] = useState("All");
      const [filterType, setFilterType] = useState("All");

      const filtered = leaderboard.filter(u => {
        if (filterSchool !== "All" && u.school !== filterSchool) return false;
        if (filterType === "Staff" && u.submission_type !== "self") return false;
        if (filterType === "Class" && u.submission_type !== "class") return false;
        return true;
      });

      return (
        <div>
          <div className="card">
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div className="section-title" style={{marginBottom:0}}>🏆 Leaderboard</div>
              <div className="pill">{Object.keys(results).length}/72 results in</div>
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:"#546e7a",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Filter by school</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                <button className={`group-tab${filterSchool==="All"?" active":""}`} onClick={()=>setFilterSchool("All")}>All Schools</button>
                {SCHOOLS.map(s=>{
                  const short = s.split(" ")[0];
                  return <button key={s} className={`group-tab${filterSchool===s?" active":""}`} onClick={()=>setFilterSchool(s)}>{short}</button>;
                })}
              </div>
              <div style={{fontSize:12,fontWeight:700,color:"#546e7a",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Filter by type</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {["All","Staff","Class"].map(t=><button key={t} className={`group-tab${filterType===t?" active":""}`} onClick={()=>setFilterType(t)}>{t==="Class"?"🏫 Class entries":t==="Staff"?"🙋 Staff":"All"}</button>)}
              </div>
            </div>
            <div style={{height:1,background:"#e8f5e9",marginBottom:12}}/>
            {filtered.length===0
              ? <div style={{fontSize:14,color:"#aaa",textAlign:"center",padding:"1.5rem 0"}}>No participants match this filter yet.</div>
              : filtered.map((u,i)=>{
                const hasPoints = u.pts > 0;
                return (
                  <div key={u.email} className={`lb-row${i===0&&hasPoints?" gold":""}`}>
                    <div style={{width:30,textAlign:"center",fontSize:i<3&&hasPoints?20:14,fontWeight:700,color:"#aaa"}}>
                      {hasPoints?(i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1):i+1}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</div>
                      <div style={{fontSize:11,color:"#aaa",marginTop:1,display:"flex",gap:6,flexWrap:"wrap"}}>
                        <span>{u.school}</span>
                        <span>·</span>
                        <span>{u.submission_type === "class" ? "Class entry" : "Staff"}</span>
                      </div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div className="badge">{u.pts} pts</div>
                      <div style={{fontSize:11,color:"#aaa",marginTop:3}}>{u.correct} correct</div>
                    </div>
                  </div>
                );
              })
            }
          </div>
          <div className="card" style={{background:"#e8f5e9",border:"none"}}>
            <div style={{fontSize:13,color:"#2e7d32",fontWeight:600}}>Scoring: 3 points for every correct result (home win / draw / away win)</div>
          </div>
        </div>
      );
    }

    // ─── ADMIN ────────────────────────────────────────────────────────────────
    function AdminView({ results, saveResult, adminMode, setAdminMode, users, saveUser, deleteUser }) {
      const [pw, setPw] = useState("");
      const [err, setErr] = useState("");
      const [activeTab, setActiveTab] = useState("results");
      const [activeGroup, setActiveGroup] = useState("A");
      const [saving, setSaving] = useState(false);
      const [saved, setSaved] = useState(false);
      const [search, setSearch] = useState("");
      const [editingUser, setEditingUser] = useState(null);
      const [editPreds, setEditPreds] = useState({});
      const [editGroup, setEditGroup] = useState("A");
      const [confirmDelete, setConfirmDelete] = useState(null);
      const [subSaved, setSubSaved] = useState(false);

      const FUNCTION_URL = "https://kmavclegdxssujusxtzd.supabase.co/functions/v1/send-verification";

      const login = async () => {
        try {
          const res = await fetch(FUNCTION_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_KEY}` },
            body: JSON.stringify({ action: "admin_login", email: "admin", code: pw }),
          });
          const data = await res.json();
          if (data.valid) { setAdminMode(true); setErr(""); }
          else setErr("Incorrect password.");
        } catch(e) { setErr("Network error. Please try again."); }
      };

      const handleSaveResult = async (fid, val) => {
        setSaved(false);
        await saveResult(fid, val);
        setSaved(true);
        setTimeout(()=>setSaved(false),2000);
      };

      const handleEditUser = u => { setEditingUser(u.email); setEditPreds({...u.predictions}); setEditGroup("A"); };
      const handleSaveEdit = async () => {
        setSaving(true);
        const u = users.find(x=>x.email===editingUser);
        await saveUser({...u, predictions: editPreds});
        setSaving(false); setEditingUser(null); setSubSaved(true);
        setTimeout(()=>setSubSaved(false),3000);
      };
      const handleUnlock = async email => {
        const u = users.find(x=>x.email===email);
        await saveUser({...u, submitted: false});
      };

      if (!adminMode) return (
        <div className="card card-accent">
          <div className="section-title">🔧 Admin Panel</div>
          <p style={{fontSize:13,color:"#666",marginBottom:14}}>Enter the admin password to manage the competition.</p>
          <input className="input" type="password" placeholder="Admin password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>
          {err&&<div className="err">{err}</div>}
          <button className="btn" onClick={login}>Login →</button>
        </div>
      );

      if (editingUser) {
        const total=Object.keys(editPreds).length;
        const u = users.find(x=>x.email===editingUser);
        return (
          <div>
            <div className="card card-accent" style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                <div>
                  <div className="section-title" style={{marginBottom:2}}>✏️ Editing: {u?.name}</div>
                  <div style={{fontSize:12,color:"#546e7a"}}>{editingUser} · {u?.school}</div>
                </div>
                <button className="btn" style={{background:"#888",padding:"7px 14px",fontSize:13}} onClick={()=>setEditingUser(null)}>← Back</button>
              </div>
              <div style={{marginTop:10,fontSize:13,color:"#666"}}>{total}/72 predictions set</div>
              <div className="progress-bar" style={{marginTop:6}}><div className="progress-fill" style={{width:`${(total/72)*100}%`}}/></div>
            </div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {Object.keys(GROUPS).map(g=>{
                const gf=FIXTURES.filter(f=>f.group===g),done=gf.filter(f=>editPreds[f.id]).length;
                return <button key={g} className={`group-tab${editGroup===g?" active":""}`} onClick={()=>setEditGroup(g)}>Group {g} {done===gf.length?"✅":`${done}/${gf.length}`}</button>;
              })}
            </div>
            <div className="card">
              <div className="section-title">Group {editGroup}</div>
              {FIXTURES.filter(f=>f.group===editGroup).map(f=>(
                <div key={f.id} className="fix-row">
                  <div className="fix-label">{FLAGS[f.home]||"🏳"} {f.home} <span style={{color:"#ccc",margin:"0 6px",fontWeight:400}}>vs</span> {FLAGS[f.away]||"🏳"} {f.away}</div>
                  <div className="pred-btns">
                    {[["H",`${f.home} win`],["D","Draw"],["A",`${f.away} win`]].map(([c,label])=>(
                      <button key={c} className={`pred-btn${editPreds[f.id]===c?" selected":""}`} style={{fontSize:12,padding:"5px 10px"}} onClick={()=>setEditPreds(p=>({...p,[f.id]:c}))}>{label}</button>
                    ))}
                    {editPreds[f.id]&&<button className="pred-btn" style={{color:"#c00",borderColor:"#fcc",fontSize:11}} onClick={()=>setEditPreds(p=>{const n={...p};delete n[f.id];return n;})}>✕ Clear</button>}
                  </div>
                </div>
              ))}
            </div>
            <div style={{marginTop:14,display:"flex",gap:10,alignItems:"center"}}>
              <button className="btn" style={{background:"#2e7d32"}} onClick={handleSaveEdit} disabled={saving}>{saving?"Saving...":"💾 Save Changes"}</button>
              <button className="btn" style={{background:"#888"}} onClick={()=>setEditingUser(null)}>Cancel</button>
            </div>
          </div>
        );
      }

      const participantList = users.filter(u=>
        !search||u.name?.toLowerCase().includes(search.toLowerCase())||u.email?.toLowerCase().includes(search.toLowerCase())||u.school?.toLowerCase().includes(search.toLowerCase())
      );

      return (
        <div>
          <div className="card" style={{marginBottom:12}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div className="section-title" style={{marginBottom:0}}>🔧 Admin Panel</div>
              <div className="pill">{users.length} participants</div>
            </div>
            <div className="tabs">
              {[["results","⚽ Match Results"],["submissions","👥 Manage Submissions"]].map(([t,label])=>(
                <button key={t} className={`group-tab${activeTab===t?" active":""}`} style={{fontSize:13,padding:"7px 16px"}} onClick={()=>setActiveTab(t)}>{label}</button>
              ))}
            </div>
          </div>

          {activeTab==="results"&&(
            <>
              <div className="card" style={{marginBottom:12}}>
                <p style={{fontSize:13,color:"#666"}}>Click a result to save it instantly. Leaderboard updates in real time.</p>
                {saved&&<div className="ok" style={{marginTop:8}}>✅ Result saved!</div>}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
                {Object.keys(GROUPS).map(g=>{
                  const done=FIXTURES.filter(f=>f.group===g&&results[f.id]).length,tot=FIXTURES.filter(f=>f.group===g).length;
                  return <button key={g} className={`group-tab${activeGroup===g?" active":""}`} onClick={()=>setActiveGroup(g)}>Group {g} {done>0?`${done}/${tot}`:""}</button>;
                })}
              </div>
              <div className="card">
                <div className="section-title">Group {activeGroup} Results</div>
                {FIXTURES.filter(f=>f.group===activeGroup).map(f=>(
                  <div key={f.id} className="fix-row">
                    <div className="fix-label">{FLAGS[f.home]||"🏳"} {f.home} <span style={{color:"#ccc",margin:"0 6px",fontWeight:400}}>vs</span> {FLAGS[f.away]||"🏳"} {f.away}</div>
                    <div className="pred-btns">
                      {[["H",`${f.home} win`],["D","Draw"],["A",`${f.away} win`]].map(([c,label])=>(
                        <button key={c} className={`pred-btn${results[f.id]===c?" selected":""}`} style={{fontSize:12,padding:"5px 10px"}} onClick={()=>handleSaveResult(f.id,c)}>{label}</button>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </>
          )}

          {activeTab==="submissions"&&(
            <>
              <div className="card" style={{marginBottom:12}}>
                <p style={{fontSize:13,color:"#666",marginBottom:10}}>Edit, unlock or delete participant submissions.</p>
                <input className="input" style={{marginBottom:0}} placeholder="🔍 Search by name, email or school..." value={search} onChange={e=>setSearch(e.target.value)}/>
              </div>
              {subSaved&&<div className="alert alert-green" style={{marginBottom:12}}>✅ Submission updated.</div>}
              {participantList.length===0
                ? <div className="card" style={{textAlign:"center",color:"#aaa",fontSize:14}}>No participants found.</div>
                : participantList.map(u=>(
                  <div key={u.email} className="card" style={{marginBottom:8}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
                      <div>
                        <div style={{fontSize:14,fontWeight:700}}>{u.name||"—"}</div>
                        <div style={{fontSize:12,color:"#546e7a"}}>{u.email}</div>
                        <div style={{fontSize:11,color:"#aaa",marginTop:2}}>
                          {u.school} · {u.submission_type === "class" ? "Class entry" : "Staff"}
                          {" · "}{Object.keys(u.predictions||{}).length}/72 predictions
                          {" · "}<span style={{color:u.submitted?"#2e7d32":"#e65100",fontWeight:700}}>{u.submitted?"🔒 Locked":"🔓 Unlocked"}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        <button className="btn" style={{padding:"6px 12px",fontSize:12}} onClick={()=>handleEditUser(u)}>✏️ Edit</button>
                        <button className="btn btn-yellow" style={{padding:"6px 12px",fontSize:12}} onClick={()=>handleUnlock(u.email)}>🔓 Unlock</button>
                        <button className="btn btn-red" style={{padding:"6px 12px",fontSize:12}} onClick={()=>setConfirmDelete(u.email)}>🗑 Delete</button>
                      </div>
                    </div>
                    {confirmDelete===u.email&&(
                      <div className="alert alert-orange" style={{marginTop:10}}>
                        <div style={{fontWeight:700,marginBottom:6}}>⚠️ Delete {u.name}'s submission? This cannot be undone.</div>
                        <div style={{display:"flex",gap:8}}>
                          <button className="btn btn-red" style={{padding:"6px 14px",fontSize:12}} onClick={()=>{deleteUser(u.email);setConfirmDelete(null);}}>Yes, delete</button>
                          <button className="btn" style={{background:"#888",padding:"6px 14px",fontSize:12}} onClick={()=>setConfirmDelete(null)}>Cancel</button>
                        </div>
                      </div>
                    )}
                  </div>
                ))
              }
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
