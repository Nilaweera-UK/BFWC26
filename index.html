function App() {
  const [view, setView] = useState("home");
  const [users, setUsers] = useState([]);
  const [results, setResults] = useState({});
  const [session, setSession] = useState(null);
  const [adminMode, setAdminMode] = useState(false);
  const [loading, setLoading] = useState(true);

  const fetchData = useCallback(async () => {
    try {
      const [{data:uData},{data:rData}] = await Promise.all([
        sb.from("blossom_users").select("*"),
        sb.from("blossom_results").select("*"),
      ]);
      if (uData) setUsers(uData);
      if (rData) { const m={}; rData.forEach(r=>m[r.fixture_id]=r.result); setResults(m); }
    } catch(e) { console.error(e); }
    setLoading(false);
  }, []);

  useEffect(()=>{fetchData();},[fetchData]);
  useEffect(()=>{
    const u=sb.channel("bf-users").on("postgres_changes",{event:"*",schema:"public",table:"blossom_users"},fetchData).subscribe();
    const r=sb.channel("bf-results").on("postgres_changes",{event:"*",schema:"public",table:"blossom_results"},fetchData).subscribe();
    return ()=>{sb.removeChannel(u);sb.removeChannel(r);};
  },[fetchData]);

  const saveUser   = async d=>{await sb.from("blossom_users").upsert(d,{onConflict:"email"});await fetchData();};
  const saveResult = async (fid,res)=>{await sb.from("blossom_results").upsert({fixture_id:fid,result:res,updated_at:new Date().toISOString()},{onConflict:"fixture_id"});await fetchData();};
  const deleteUser = async email=>{await sb.from("blossom_users").delete().eq("email",email);await fetchData();};

  const scoreUser = preds=>{
    let pts=0,correct=0;
    for(const [fid,pred] of Object.entries(preds||{}))
      if(results[fid]&&results[fid]===pred){pts+=3;correct++;}
    return {pts,correct};
  };

  const leaderboard = users.map(u=>({...u,predictions:u.predictions||{},...scoreUser(u.predictions)})).sort((a,b)=>b.pts-a.pts||b.correct-a.correct);
  const sessionUser = session?users.find(u=>u.email===session):null;

  const Header=()=>(
    <div className="header">
      <div className="header-top">
        <div className="federation-name">&#127800; Blossom Federation</div>
        <div className="app-title">World Cup 2026 Predictor &#9917;</div>
        <div className="app-sub">Predict all 72 group stage fixtures &mdash; best score wins!</div>
        <div className="schools-row">{SCHOOLS.map(s=><span key={s} className="school-chip">{s}</span>)}</div>
        <div className="nav">
          {[["home","&#127968; Home"],["predict","&#128221; Predict"],["fixtures","&#128197; Fixtures"],["leaderboard","&#127942; Leaderboard"],["admin","&#128295; Admin"]].map(([v,label])=>(
            <button key={v} className={`nav-btn${view===v?" active":""}`} onClick={()=>setView(v)} dangerouslySetInnerHTML={{__html:label}}/>
          ))}
        </div>
      </div>
      <div className="header-accent"/>
    </div>
  );

  if(loading) return(<><style>{css}</style><div className="app"><Header/><div style={{display:"flex",justifyContent:"center",padding:"3rem"}}><div className="spin"/></div></div></>);

  return(
    <><style>{css}</style>
    <div className="app">
      <Header/>
      <div className="content">
        {view==="home"        &&<HomeView setView={setView} leaderboard={leaderboard} results={results}/>}
        {view==="predict"     &&<PredictView users={users} saveUser={saveUser} session={session} setSession={setSession} closed={new Date()>=DEADLINE} sessionUser={sessionUser}/>}
        {view==="fixtures"    &&<FixturesView results={results} leaderboard={leaderboard} saveResult={saveResult}/>}
        {view==="leaderboard" &&<LeaderboardView leaderboard={leaderboard} results={results}/>}

}

function ProgressChart({leaderboard,results}){
  const [highlighted,setHighlighted]=useState(null);
  const COLORS=["#2e7d32","#f9a825","#00796b","#ad1457","#e65100","#1565c0","#6a1b9a","#00838f","#558b2f","#c62828","#4527a0","#e65100","#2e7d32","#f9a825","#00796b","#ad1457"];
  const played=FIXTURES.filter(f=>results[f.id]);
  const series=leaderboard.map((u,i)=>{
    let pts=0;const points=[0];
    played.forEach(f=>{if(u.predictions[f.id]&&results[f.id]===u.predictions[f.id])pts+=3;points.push(pts);});
    return{name:u.name,points,color:COLORS[i%COLORS.length]};
  });
  const maxPts=Math.max(...series.map(s=>s.points[s.points.length-1]),3);
  const mc=played.length;
  const W=600,H=300,PL=36,PR=12,PT=12,PB=28,cW=W-PL-PR,cH=H-PT-PB;
  const xP=i=>PL+(mc===0?0:(i/mc)*cW),yP=v=>PT+cH-(v/maxPts)*cH;
  const step=maxPts<=9?3:maxPts<=18?6:maxPts<=30?9:12;
  const yT=[];for(let v=0;v<=maxPts;v+=step)yT.push(v);
  const xS=mc<=12?2:mc<=24?4:6;const xT=[];for(let i=0;i<=mc;i+=xS)xT.push(i);
  const toggle=n=>setHighlighted(h=>h===n?null:n);
  return(
    <div style={{overflowX:"auto"}}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",minWidth:320,fontFamily:"Nunito,sans-serif"}}>
        {yT.map(v=>(<g key={v}><line x1={PL} y1={yP(v)} x2={W-PR} y2={yP(v)} stroke="#f1f8e9" strokeWidth="1"/><text x={PL-4} y={yP(v)+4} textAnchor="end" fontSize="9" fill="#aaa">{v}</text></g>))}
        {xT.map(i=>(<text key={i} x={xP(i)} y={H-8} textAnchor="middle" fontSize="9" fill="#aaa">{i}</text>))}
        <text x={PL-28} y={PT+cH/2} textAnchor="middle" fontSize="9" fill="#888" transform={`rotate(-90,${PL-28},${PT+cH/2})`}>Points</text>
        <text x={PL+cW/2} y={H-1} textAnchor="middle" fontSize="9" fill="#888">Matches played</text>
        {highlighted&&series.filter(s=>s.name!==highlighted).map(s=>{const d=s.points.map((v,i)=>`${i===0?"M":"L"}${xP(i)},${yP(v)}`).join(" ");return<path key={s.name} d={d} fill="none" stroke={s.color} strokeWidth="1" strokeOpacity="0.12" strokeLinejoin="round" strokeLinecap="round"/>;})}
        {series.filter(s=>!highlighted||s.name===highlighted).map(s=>{const hl=highlighted===s.name,d=s.points.map((v,i)=>`${i===0?"M":"L"}${xP(i)},${yP(v)}`).join(" ");return<path key={s.name} d={d} fill="none" stroke={s.color} strokeWidth={hl?3:1.5} strokeOpacity={hl?1:0.7} strokeLinejoin="round" strokeLinecap="round" style={{cursor:"pointer"}} onClick={()=>toggle(s.name)}/>;})}
        {series.map(s=>{const last=s.points[s.points.length-1],hl=highlighted===s.name,dim=highlighted&&!hl;return<circle key={s.name} cx={xP(s.points.length-1)} cy={yP(last)} r={hl?4:2.5} fill={s.color} fillOpacity={dim?0.12:0.9} style={{cursor:"pointer"}} onClick={()=>toggle(s.name)}/>;})}
        {highlighted&&series.filter(s=>s.name===highlighted).map(s=>{const last=s.points[s.points.length-1];return<text key={s.name} x={xP(s.points.length-1)+6} y={yP(last)+4} fontSize="10" fontWeight="700" fill={s.color}>{s.name}</text>;})}
      </svg>
      <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
        {series.map(s=>{const hl=highlighted===s.name,dim=highlighted&&!hl;return(<div key={s.name} onClick={()=>toggle(s.name)} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,fontWeight:hl?800:600,color:dim?"#ccc":hl?s.color:"#555",cursor:"pointer",padding:"2px 6px",borderRadius:20,background:hl?"#f9fdf9":"transparent",border:hl?`1.5px solid ${s.color}`:"1.5px solid transparent"}}><div style={{width:12,height:3,borderRadius:2,background:dim?"#ddd":s.color}}/><span>{s.name}</span></div>);})}
      </div>
    </div>
  );
}

function FixturesView({results,leaderboard,saveResult}){
  const [expanded,setExpanded]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState("");
  const [selDate,setSelDate]=useState(null);
  const handleSync=async()=>{
    setSyncing(true);setSyncMsg("");
    try{
      const res=await fetch(FUNCTION_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({action:"sync_results"})});
      if(!res.ok){setSyncMsg("API error. Please try again.");setSyncing(false);return;}
      const data=await res.json();const matches=data.matches||[];let updated=0;
      for(const m of matches){
        const home=normalise(m.homeTeam?.name),away=normalise(m.awayTeam?.name),hg=m.score?.fullTime?.home,ag=m.score?.fullTime?.away;
        if(!home||!away||hg===null||ag===null)continue;
        const fix=FIXTURES.find(f=>f.home===home&&f.away===away);if(!fix)continue;
        await saveResult(fix.id,hg>ag?"H":ag>hg?"A":"D");updated++;
      }
      setSyncMsg(`${updated} result${updated!==1?"s":""} synced.`);
    }catch(e){setSyncMsg("Network error.");}
    setSyncing(false);
  };
  const byDate={};FIXTURES.forEach(f=>{if(!byDate[f.date])byDate[f.date]=[];byDate[f.date].push(f);});
  const dates=Object.keys(byDate).sort();
  const today=new Date().toISOString().slice(0,10);
  const fmtLong=s=>new Date(s+"T12:00:00Z").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const fmtShort=s=>{const d=new Date(s+"T12:00:00Z");return{day:d.toLocaleDateString("en-GB",{weekday:"short"}),dt:d.getDate(),mo:d.toLocaleDateString("en-GB",{month:"short"})};};
  const stats=fid=>{let h=0,d=0,a=0;const hu=[],du=[],au=[];leaderboard.forEach(u=>{const p=(u.predictions||{})[fid];if(p==="H"){h++;hu.push(u.name);}else if(p==="D"){d++;du.push(u.name);}else if(p==="A"){a++;au.push(u.name);}});return{h,d,a,total:h+d+a,hu,du,au};};
  const scrollTo=date=>{setSelDate(date);setTimeout(()=>{const el=document.getElementById(`dt-${date}`);if(el)el.scrollIntoView({behavior:"smooth",block:"start"});},50);};
  return(
    <div>
      <div className="fixtures-sticky">
        <div className="card" style={{marginBottom:0}}>
          <div className="section-title" style={{marginBottom:8}}>Group Stage Fixtures</div>
          <p style={{fontSize:13,color:"#666",marginBottom:12}}>All times in BST. Tap a fixture to see predictions.</p>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:14,flexWrap:"wrap"}}>
            <button className="btn" style={{fontSize:13,padding:"8px 16px",background:"#43a047"}} onClick={handleSync} disabled={syncing}>{syncing?"Syncing...":"Sync Results"}</button>
            {syncMsg&&<span style={{fontSize:12,color:syncMsg.includes("synced")?"#2e7d32":"#c62828",fontWeight:600}}>{syncMsg}</span>}
          </div>
          <div style={{overflowX:"auto",paddingBottom:4}}>
            <div style={{display:"flex",gap:6,minWidth:"max-content"}}>
              {dates.map(date=>{
                const {day,dt,mo}=fmtShort(date),active=selDate===date,isT=date===today,isPast=date<today;
                const bc=active?"#2e7d32":isT?"#f9a825":isPast?"#43a047":"#c5e1a5";
                const bg=active?"#2e7d32":isT?"#fffde7":isPast?"#e8f5e9":"#fff";
                const color=active?"#fff":isT?"#f9a825":isPast?"#2e7d32":"#555";
                return(<button key={date} onClick={()=>scrollTo(date)} style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"6px 10px",borderRadius:10,border:`1.5px solid ${bc}`,background:bg,color,cursor:"pointer",fontFamily:"inherit",minWidth:46}}><span style={{fontSize:10,fontWeight:700,textTransform:"uppercase",opacity:.8}}>{day}</span><span style={{fontSize:18,fontWeight:800,lineHeight:1.2}}>{dt}</span><span style={{fontSize:10,fontWeight:600,opacity:.8}}>{mo}</span></button>);
              })}
            </div>
          </div>
        </div>
      </div>
      {dates.map(date=>{
        const dayF=byDate[date];
        return(<div key={date} id={`dt-${date}`}>
          <div className="date-header">{fmtLong(date)}</div>
          {dayF.map(f=>{
            const res=results[f.id],st=stats(f.id),isExp=expanded===f.id;
            return(<div key={f.id} className="fix-card" onClick={()=>setExpanded(isExp?null:f.id)}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                <div style={{fontSize:14,fontWeight:700,flex:1}}>{FLAGS[f.home]||""} {f.home}</div>
                <div style={{fontSize:11,color:"#bbb",fontWeight:700}}>vs</div>
                <div style={{fontSize:14,fontWeight:700,flex:1,textAlign:"right"}}>{f.away} {FLAGS[f.away]||""}</div>
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={{fontSize:10,fontWeight:800,background:"#e8f5e9",color:"#2e7d32",borderRadius:10,padding:"2px 8px"}}>Group {f.group}</span>
                  <span style={{fontSize:11,color:"#aaa",fontWeight:600}}>{f.time} BST</span>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {res?<span className="badge badge-green">{res==="H"?`${f.home} win`:res==="D"?"Draw":`${f.away} win`}</span>:<span className="badge badge-gray">No result yet</span>}
                  <span style={{fontSize:14,color:"#c5e1a5"}}>{isExp?"&#9650;":"&#9660;"}</span>
                </div>
              </div>
              {st.total>0&&(<div style={{marginTop:10,borderTop:"1px solid #f1f8e9",paddingTop:8}}>
                <div style={{fontSize:11,fontWeight:700,color:"#546e7a",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.4px"}}>
                  Predictions &mdash; {st.total} entr{st.total!==1?"ies":"y"}
                  {res&&<span style={{marginLeft:8,color:"#2e7d32"}}>&middot; {res==="H"?st.h:res==="D"?st.d:st.a} correct ({Math.round(((res==="H"?st.h:res==="D"?st.d:st.a)/st.total)*100)}%)</span>}
                </div>
                {[["H",f.home,st.h,st.hu,"#2e7d32"],["D","Draw",st.d,st.du,"#f9a825"],["A",f.away,st.a,st.au,"#00796b"]].map(([code,label,count,names,color])=>{
                  const pct=st.total>0?Math.round((count/st.total)*100):0,correct=res&&res===code;
                  return(<div key={code} style={{marginBottom:isExp?8:3}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:"#666"}}>
                      <span style={{minWidth:100,fontWeight:correct?700:400,color:correct?"#2e7d32":"#666"}}>{label}{correct?" OK":""}</span>
                      <div className="bar-bg"><div className="bar-fill" style={{width:`${pct}%`,background:correct?"#2e7d32":color,opacity:correct?1:0.5}}/></div>
                      <span style={{minWidth:36,textAlign:"right",fontWeight:600,color:correct?"#2e7d32":"#888"}}>{pct}%</span>
                    </div>
                    {isExp&&names.length>0&&(<div style={{marginTop:4,marginLeft:106,display:"flex",flexWrap:"wrap",gap:4}}>{names.map(n=>(<span key={n} style={{fontSize:11,background:correct?"#e8f5e9":"#f1f8e9",color:correct?"#1b5e20":"#2e7d32",borderRadius:20,padding:"2px 8px",fontWeight:600}}>{n}</span>))}</div>)}
                  </div>);
                })}
              </div>)}
              {st.total===0&&isExp&&<div style={{marginTop:8,fontSize:12,color:"#ccc",borderTop:"1px solid #f1f8e9",paddingTop:8}}>No predictions submitted yet</div>}
            </div>);
          })}
        </div>);
      })}
    </div>
  );
}

function LeaderboardView({leaderboard,results}){
  const [filterSchool,setFilterSchool]=useState("All");
  const [filterType,setFilterType]=useState("All");
  const [selUser,setSelUser]=useState(null);
  const filtered=leaderboard.filter(u=>{
    if(filterSchool!=="All"&&u.school!==filterSchool)return false;
    if(filterType==="Staff"&&u.submission_type!=="self")return false;
    if(filterType==="Class"&&u.submission_type!=="class")return false;
    return true;
  });
  if(selUser){
    const u=leaderboard.find(x=>x.email===selUser);if(!u)return null;
    const preds=u.predictions||{},rIn=Object.keys(results).length;
    return(<div>
      <div className="card card-accent" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div><div style={{fontSize:16,fontWeight:800,color:"#2e7d32"}}>{u.name}</div><div style={{fontSize:12,color:"#546e7a"}}>{u.school} &middot; {u.submission_type==="class"?"Class entry":"Staff"}</div></div>
          <button className="btn" style={{background:"#888",padding:"7px 14px",fontSize:13}} onClick={()=>setSelUser(null)}>&larr; Back</button>
        </div>
        <div style={{display:"flex",gap:10,marginTop:12,flexWrap:"wrap"}}>
          <div className="stat-card" style={{flex:1,minWidth:90}}><div className="stat-val">{u.pts}</div><div className="stat-label">Points</div></div>
          <div className="stat-card" style={{flex:1,minWidth:90}}><div className="stat-val">{u.correct}</div><div className="stat-label">Correct</div></div>
          <div className="stat-card" style={{flex:1,minWidth:90}}><div className="stat-val">{rIn>0?`${Math.round((u.correct/rIn)*100)}%`:"&mdash;"}</div><div className="stat-label">Accuracy</div></div>
        </div>
      </div>
      {Object.keys(GROUPS).map(g=>{const gF=FIXTURES.filter(f=>f.group===g);return(<div key={g} className="card" style={{marginBottom:8}}>
        <div className="section-title">Group {g}</div>
        {gF.map(f=>{
          const pred=preds[f.id],res=results[f.id],isC=pred&&res&&pred===res,isW=pred&&res&&pred!==res,isP=pred&&!res;
          const pl=pred==="H"?`${f.home} win`:pred==="D"?"Draw":pred==="A"?`${f.away} win`:null;
          const rl=res==="H"?`${f.home} win`:res==="D"?"Draw":res==="A"?`${f.away} win`:null;
          return(<div key={f.id} style={{padding:"9px 0",borderBottom:"1px solid #f1f8e9"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:5,color:"#333"}}>{FLAGS[f.home]||""} {f.home} <span style={{color:"#bbb",margin:"0 4px",fontWeight:400}}>vs</span> {FLAGS[f.away]||""} {f.away}</div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {!pred?<span style={{fontSize:12,color:"#ccc"}}>No prediction</span>:<span style={{fontSize:12,fontWeight:700,padding:"3px 10px",borderRadius:8,background:isC?"#e8f5e9":isW?"#fde8e8":isP?"#e8f5e9":"#f5f5f5",color:isC?"#1b5e20":isW?"#c62828":isP?"#2e7d32":"#888",border:`1.5px solid ${isC?"#a5d6a7":isW?"#f5c0c0":isP?"#c5e1a5":"#eee"}`}}>{isC?"OK ":isW?"X ":isP?"... ":""}{pl}</span>}
              {res&&<span style={{fontSize:11,color:"#aaa",fontWeight:600}}>Result: {rl}</span>}
            </div>
          </div>);
        })}
      </div>);})}
    </div>);
  }
  return(<div>
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div className="section-title" style={{marginBottom:0}}>Leaderboard</div>
        <div className="pill">{Object.keys(results).length}/72 results in</div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:"#546e7a",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Filter by school</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          <button className={`group-tab${filterSchool==="All"?" active":""}`} onClick={()=>setFilterSchool("All")}>All Schools</button>
          {SCHOOLS.map(s=><button key={s} className={`group-tab${filterSchool===s?" active":""}`} onClick={()=>setFilterSchool(s)}>{s.split(" ")[0]}</button>)}
        </div>
        <div style={{fontSize:12,fontWeight:700,color:"#546e7a",textTransform:"uppercase",letterSpacing:"0.5px",marginBottom:6}}>Filter by type</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[["All","All"],["Staff","Staff"],["Class","Class entries"]].map(([v,label])=>(
            <button key={v} className={`group-tab${filterType===v?" active":""}`} onClick={()=>setFilterType(v)}>{label}</button>
          ))}
        </div>
      </div>
      <div style={{height:1,background:"#e8f5e9",marginBottom:8}}/>
      <div style={{fontSize:12,color:"#aaa",marginBottom:12,fontStyle:"italic"}}>Tap a name to see their full predictions</div>
      {filtered.length===0?<div style={{fontSize:14,color:"#aaa",textAlign:"center",padding:"1.5rem 0"}}>No entries match this filter yet.</div>:filtered.map((u,i)=>{
        const hp=u.pts>0;
        return(<div key={u.email} className={`lb-row${i===0&&hp?" gold":""}`} onClick={()=>setSelUser(u.email)}>
          <div style={{width:30,textAlign:"center",fontSize:i<3&&hp?20:14,fontWeight:700,color:"#aaa"}}>{hp?(i===0?"1":i===1?"2":i===2?"3":i+1):i+1}</div>
          <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</div><div style={{fontSize:11,color:"#aaa",marginTop:1}}>{u.school} &middot; {u.submission_type==="class"?"Class":"Staff"}</div></div>
          <div style={{textAlign:"right"}}><div className="badge">{u.pts} pts</div><div style={{fontSize:11,color:"#aaa",marginTop:3}}>{u.correct} correct</div></div>
          <div style={{fontSize:16,color:"#c5e1a5"}}>&rsaquo;</div>
        </div>);
      })}
    </div>
    <div className="card" style={{background:"#e8f5e9",border:"none"}}><div style={{fontSize:13,color:"#2e7d32",fontWeight:600}}>Scoring: 3 points for every correct result (home win / draw / away win)</div></div>
  </div>);
}

function AdminView({results,saveResult,adminMode,setAdminMode,users,saveUser,deleteUser}){
  const [pw,setPw]=useState("");const [err,setErr]=useState("");
  const [tab,setTab]=useState("results");const [grp,setGrp]=useState("A");
  const [saved,setSaved]=useState(false);const [search,setSearch]=useState("");
  const [editUser,setEditUser]=useState(null);const [editPreds,setEditPreds]=useState({});const [editGrp,setEditGrp]=useState("A");
  const [confDel,setConfDel]=useState(null);const [subSaved,setSubSaved]=useState(false);
  const [saving,setSaving]=useState(false);const [syncing,setSyncing]=useState(false);const [syncMsg,setSyncMsg]=useState("");

  const handleSync=async()=>{
    setSyncing(true);setSyncMsg("");
    try{
      const res=await fetch(FUNCTION_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({action:"sync_results"})});
      if(!res.ok){setSyncMsg("API error.");setSyncing(false);return;}
      const data=await res.json();const matches=data.matches||[];let updated=0;
      for(const m of matches){const home=normalise(m.homeTeam?.name),away=normalise(m.awayTeam?.name),hg=m.score?.fullTime?.home,ag=m.score?.fullTime?.away;if(!home||!away||hg===null||ag===null)continue;const fix=FIXTURES.find(f=>f.home===home&&f.away===away);if(!fix)continue;await saveResult(fix.id,hg>ag?"H":ag>hg?"A":"D");updated++;}
      setSyncMsg(`${updated} result${updated!==1?"s":""} synced.`);
    }catch(e){setSyncMsg("Network error.");}
    setSyncing(false);
  };
  const login=async()=>{try{const res=await fetch(FUNCTION_URL,{method:"POST",headers:{"Content-Type":"application/json","Authorization":`Bearer ${SUPABASE_KEY}`},body:JSON.stringify({action:"admin_login",email:"admin",code:pw})});const data=await res.json();if(data.valid){setAdminMode(true);setErr("");}else setErr("Incorrect password.");}catch(e){setErr("Network error.");}};
  const savRes=async(fid,val)=>{setSaved(false);await saveResult(fid,val);setSaved(true);setTimeout(()=>setSaved(false),2000);};
  const startEdit=u=>{setEditUser(u.email);setEditPreds({...u.predictions});setEditGrp("A");};
  const saveEdit=async()=>{setSaving(true);const u=users.find(x=>x.email===editUser);await saveUser({...u,predictions:editPreds});setSaving(false);setEditUser(null);setSubSaved(true);setTimeout(()=>setSubSaved(false),3000);};
  const unlock=async email=>{const u=users.find(x=>x.email===email);await saveUser({...u,submitted:false});};

  if(!adminMode) return(<div className="card card-accent"><div className="section-title">Admin Panel</div><p style={{fontSize:13,color:"#666",marginBottom:14}}>Enter the admin password to manage the competition.</p><input className="input" type="password" placeholder="Admin password" value={pw} onChange={e=>setPw(e.target.value)} onKeyDown={e=>e.key==="Enter"&&login()}/>{err&&<div className="err">{err}</div>}<button className="btn" onClick={login}>Login &rarr;</button></div>);

  if(editUser){
    const tot=Object.keys(editPreds).length;
    return(<div>
      <div className="card card-accent" style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div><div className="section-title" style={{marginBottom:2}}>Editing: {users.find(u=>u.email===editUser)?.name}</div><div style={{fontSize:12,color:"#546e7a"}}>{editUser}</div></div>
          <button className="btn" style={{background:"#888",padding:"7px 14px",fontSize:13}} onClick={()=>setEditUser(null)}>&larr; Back</button>
        </div>
        <div style={{marginTop:10,fontSize:13,color:"#666"}}>{tot}/72 predictions set</div>
        <div className="progress-bar" style={{marginTop:6}}><div className="progress-fill" style={{width:`${(tot/72)*100}%`}}/></div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{Object.keys(GROUPS).map(g=>{const gf=FIXTURES.filter(f=>f.group===g),done=gf.filter(f=>editPreds[f.id]).length;return<button key={g} className={`group-tab${editGrp===g?" active":""}`} onClick={()=>setEditGrp(g)}>Group {g} {done===gf.length?"OK":`${done}/${gf.length}`}</button>;})}</div>
      <div className="card">
        <div className="section-title">Group {editGrp}</div>
        {FIXTURES.filter(f=>f.group===editGrp).map(f=>(
          <div key={f.id} className="fix-row">
            <div className="fix-label">{FLAGS[f.home]||""} {f.home} <span style={{color:"#ccc",margin:"0 6px",fontWeight:400}}>vs</span> {FLAGS[f.away]||""} {f.away}</div>
            <div className="pred-btns">
              {[["H",`${f.home} win`],["D","Draw"],["A",`${f.away} win`]].map(([c,label])=>(<button key={c} className={`pred-btn${editPreds[f.id]===c?" selected":""}`} style={{fontSize:12,padding:"5px 10px"}} onClick={()=>setEditPreds(p=>({...p,[f.id]:c}))}>{label}</button>))}
              {editPreds[f.id]&&<button className="pred-btn" style={{color:"#c62828",borderColor:"#fcc",fontSize:11}} onClick={()=>setEditPreds(p=>{const n={...p};delete n[f.id];return n;})}>Clear</button>}
            </div>
          </div>
        ))}
      </div>
      <div style={{marginTop:14,display:"flex",gap:10,alignItems:"center"}}>
        <button className="btn" style={{background:"#2e7d32"}} onClick={saveEdit} disabled={saving}>{saving?"Saving...":"Save Changes"}</button>
        <button className="btn" style={{background:"#888"}} onClick={()=>setEditUser(null)}>Cancel</button>
      </div>
    </div>);
  }

  const pList=users.filter(u=>!search||u.name?.toLowerCase().includes(search.toLowerCase())||u.email?.toLowerCase().includes(search.toLowerCase())||u.school?.toLowerCase().includes(search.toLowerCase()));
  return(<div>
    <div className="card" style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><div className="section-title" style={{marginBottom:0}}>Admin Panel</div><div className="pill">{users.length} entries</div></div>
      <div className="tabs">{[["results","Match Results"],["submissions","Manage Submissions"]].map(([t,label])=>(<button key={t} className={`group-tab${tab===t?" active":""}`} style={{fontSize:13,padding:"7px 16px"}} onClick={()=>setTab(t)}>{label}</button>))}</div>
    </div>
    {tab==="results"&&(<>
      <div className="card" style={{marginBottom:12}}>
        <p style={{fontSize:13,color:"#666",marginBottom:10}}>Click a result to save manually, or use Sync to pull the latest results.</p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
          <button className="btn" style={{fontSize:13,padding:"8px 16px",background:"#43a047"}} onClick={handleSync} disabled={syncing}>{syncing?"Syncing...":"Sync Results"}</button>
          {syncMsg&&<span style={{fontSize:12,color:syncMsg.includes("synced")?"#2e7d32":"#c62828",fontWeight:600}}>{syncMsg}</span>}
        </div>
        {saved&&<div className="ok" style={{marginTop:8}}>Result saved!</div>}
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>{Object.keys(GROUPS).map(g=>{const done=FIXTURES.filter(f=>f.group===g&&results[f.id]).length,tot=FIXTURES.filter(f=>f.group===g).length;return<button key={g} className={`group-tab${grp===g?" active":""}`} onClick={()=>setGrp(g)}>Group {g} {done>0?`${done}/${tot}`:""}</button>;})}</div>
      <div className="card">
        <div className="section-title">Group {grp} Results</div>
        {FIXTURES.filter(f=>f.group===grp).map(f=>(<div key={f.id} className="fix-row">
          <div className="fix-label">{FLAGS[f.home]||""} {f.home} <span style={{color:"#ccc",margin:"0 6px",fontWeight:400}}>vs</span> {FLAGS[f.away]||""} {f.away}</div>
          <div className="pred-btns">{[["H",`${f.home} win`],["D","Draw"],["A",`${f.away} win`]].map(([c,label])=>(<button key={c} className={`pred-btn${results[f.id]===c?" selected":""}`} style={{fontSize:12,padding:"5px 10px"}} onClick={()=>savRes(f.id,c)}>{label}</button>))}</div>
        </div>))}
      </div>
    </>)}
    {tab==="submissions"&&(<>
      <div className="card" style={{marginBottom:12}}><p style={{fontSize:13,color:"#666",marginBottom:10}}>Edit, unlock or delete submissions.</p><input className="input" style={{marginBottom:0}} placeholder="Search by name, email or school..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      {subSaved&&<div className="alert alert-green" style={{marginBottom:12}}>Submission updated.</div>}
      {pList.length===0?<div className="card" style={{textAlign:"center",color:"#aaa",fontSize:14}}>No entries found.</div>:pList.map(u=>(
        <div key={u.email} className="card" style={{marginBottom:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:8}}>
            <div><div style={{fontSize:14,fontWeight:700}}>{u.name||"&mdash;"}</div><div style={{fontSize:12,color:"#546e7a"}}>{u.email}</div><div style={{fontSize:11,color:"#aaa",marginTop:2}}>{u.school} &middot; {u.submission_type==="class"?"Class":"Staff"} &middot; {Object.keys(u.predictions||{}).length}/72 &middot; <span style={{color:u.submitted?"#2e7d32":"#e65100",fontWeight:700}}>{u.submitted?"Locked":"Unlocked"}</span></div></div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              <button className="btn" style={{padding:"6px 12px",fontSize:12}} onClick={()=>startEdit(u)}>Edit</button>
              <button className="btn btn-yellow" style={{padding:"6px 12px",fontSize:12}} onClick={()=>unlock(u.email)}>Unlock</button>
              <button className="btn btn-red" style={{padding:"6px 12px",fontSize:12}} onClick={()=>setConfDel(u.email)}>Delete</button>
            </div>
          </div>
          {confDel===u.email&&(<div className="alert alert-orange" style={{marginTop:10}}>
            <div style={{fontWeight:700,marginBottom:6}}>Delete {u.name}'s submission? This cannot be undone.</div>
            <div style={{display:"flex",gap:8}}><button className="btn btn-red" style={{padding:"6px 14px",fontSize:12}} onClick={()=>{deleteUser(u.email);setConfDel(null);}}>Yes, delete</button><button className="btn" style={{background:"#888",padding:"6px 14px",fontSize:12}} onClick={()=>setConfDel(null)}>Cancel</button></div>
          </div>)}
        </div>
      ))}
    </>)}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
